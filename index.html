<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IINTOO_PROJECT</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="project_contain">
        <div class="left">
            <img src="bg.jpg" alt="left_photo">
            <img src="logo.svg" alt="logo_iintoo" class="logo">
        </div>

        <div class="right">
            <h1>Get iintoo it today </h1>
            <p class="subtitle">There is no charge or obligation upon registration.</p>
            
            <div class="buttons">
                <button class="facebook">
                    <img src="facebook.svg" alt="facebook" class="icon_fb">
                    <span>Register with Facebook</span>
                </button>
                <button class="linkedin">
                    <img src="linkedin.svg" alt="linkedin" class="icon_ln">
                    <span>Register with LinkedIn</span>
                </button>
            </div>
            
            <div class="line_between">
                <span>OR</span>
                </div>

                <div class="input_etc">
                    <div class="email_wrapper">
                    <label for="email">Email</label>
                 <input type="email" id="email">
                 </div>
                 <div class="phone_wrapper">
                    <label for="phone">Phone</label>
                 <input type="tel" id="phone">
                </div>

                <div class="title_sub">
                <h2>What type of investor are you?</h2>
                <p class="subtitle">Select the type of investor you are below.</p>
                </div>

                <div class="select_radio">
                    <label class="radio">
                    <input type="radio" name="type" checked>
                    <span>Individual</span>
                     <span class="info">i</span>
                    <div class="hint">
                    I am a natural person investing on my own behalf as a sole owner, joint tenant,or tenant in common.
                </div>
                </label>
                <label class="radio">
                    <input type="radio" name="type">
                    <span>Business</span>
                    <span class="info">i</span>
                    <div class="hint">
                    I am a natural person investing on my own behalf as a sole owner, joint tenant,or tenant in common.
                    </div>
                    </label>
                    <label class="radio">
                    <input type="radio" name="type">
                    <span>IRA</span>
                     <span class="info">i</span>
                    <div class="hint">
                    I am a natural person investing on my own behalf as a sole owner, joint tenant,or tenant in common.
                    </div>
                    </label>
                    <label class="radio">
                    <input type="radio" name="type">
                    <span>Trust</span>
                    <span class="info">i</span>
                    <div class="hint">
                    I am a natural person investing on my own behalf as a sole owner, joint tenant,or tenant in common.
                    </div>
                    </label>
                    </div>

                <div class="chekbox">
                <label class="checkbox">
                <input type="checkbox" name="checkbox">
                    <span> I agree to the terms and receiving notifications from iintoo
                    <a href="#">View full terms </a>
                </span>    
                </label>
                </div>
                
            
                <button class="account_button">Create Account</button>
        
                </div>
                


</body>

</html>
